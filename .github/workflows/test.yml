name: Run Tests

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the actual application code
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          path: "pipeline-eds"

      # Step 3: Set up Python and environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Run tests
        run: |
          cd "pipeline-eds"
          uv sync --group dev --group test
          uv run pytest -v
